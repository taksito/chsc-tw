<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>GitHub 中文編號轉換器 - 增強版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 30px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { border-left: 5px solid #007bff; padding-left: 15px; margin-bottom: 20px; }
        
        .section-label { font-weight: bold; margin-bottom: 8px; display: block; color: #555; }
        textarea { width: 100%; height: 180px; padding: 15px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; margin-bottom: 15px; line-height: 1.5; }
        
        .btn-group { margin-bottom: 20px; display: flex; gap: 10px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 6px; transition: 0.2s; font-weight: bold; }
        .btn-convert { background-color: #007bff; color: white; flex: 2; }
        .btn-convert:hover { background-color: #0056b3; }
        .btn-copy { background-color: #28a745; color: white; flex: 1; }
        .btn-copy:hover { background-color: #218838; }

        .status { padding: 10px 15px; border-radius: 6px; font-size: 14px; margin-bottom: 20px; }
        .loading { background: #fff3cd; color: #856404; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        
        .result-area { background-color: #f8f9fa; border: 2px dashed #dee2e6; }
    </style>
</head>
<body>

<div class="container">
    <h2>中文編號轉換系統</h2>
    
    <div id="status" class="status loading">正在連線至 GitHub 載入對照表...</div>

    <span class="section-label">原始輸入區：</span>
    <textarea id="editor" placeholder="在此輸入中文內容..."></textarea>

    <div class="btn-group">
        <button class="btn-convert" onclick="convertAll()">逐字轉換全部文字 ↓</button>
        <button class="btn-copy" onclick="copyResult()">複製結果</button>
    </div>

    <span class="section-label">轉換後結果（可直接複製）：</span>
    <textarea id="result" class="result-area" readonly placeholder="轉換後的結果會顯示在這裡..."></textarea>
</div>

<script>
    // 請替換為您的 GitHub Raw URL
    const GITHUB_URL = 'https://raw.githubusercontent.com/您的帳號/專案名/主分支/textinput.txt';
    
    let charToCodeMap = {};

    // 載入 GitHub 檔案
    async function loadConfig() {
        const statusEl = document.getElementById('status');
        try {
            const response = await fetch(GITHUB_URL);
            if (!response.ok) throw new Error('讀取失敗');
            const text = await response.text();
            
            text.split(/\r?\n/).forEach(line => {
                const parts = line.split('=');
                if (parts.length >= 2) {
                    const code = parts[0].trim();
                    const char = parts[1].trim();
                    if (char) charToCodeMap[char] = code;
                }
